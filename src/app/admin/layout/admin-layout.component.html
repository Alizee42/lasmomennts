<div class="admin-layout">

  <header class="admin-topbar">
    <a routerLink="/admin/dashboard" class="topbar__logo">
      <img src="assets/logo1.png" alt="Las Moments" class="topbar__logo-img">
    </a>

    <nav class="topbar__nav">
      <a routerLink="/admin/dashboard" routerLinkActive="active" class="topbar__link">
        <i class="fas fa-chart-bar"></i> Dashboard
      </a>
      <a href="/" target="_blank" rel="noopener noreferrer" class="topbar__link">
        <i class="fas fa-external-link-alt"></i> Voir le site
      </a>
      <button class="topbar__link topbar__link--danger" (click)="auth.logout()">
        <i class="fas fa-sign-out-alt"></i> Déconnexion
      </button>
    </nav>

    <div class="topbar__actions"></div>
  </header>

  <main class="admin-main">
    <router-outlet />
  </main>

</div>
